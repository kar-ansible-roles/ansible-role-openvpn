---
# handlers file for ansible-role-openvpn
- name: restart openvpn
  service:
    name: openvpn          #openvpn@server.service
    state: restarted

- name: enable openvpn
  service:
    name: openvpn
    enabled: true
    state: started

- name: enable openvpn@server
  service:
    name: openvpn@server
    enabled: true
    state: started


    