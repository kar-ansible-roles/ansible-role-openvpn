# tasks for server-side
- name: OpenVPN | Install packages
  ansible.builtin.apt:
    name:
     - openvpn
     - easy-rsa
     - iptables-persistent #Для работы с NAT
    state: present
  notify:
   - enable openvpn


- name: OpenVPN | Enable IPv4 forwarding
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    sysctl_set: true
    state: present
    reload: true
    ignoreerrors: true
  failed_when: false

- name: OpenVPN | Create IPTables NAT Chain
  ansible.builtin.iptables:
    table: nat
    chain: POSTROUTING
    jump: MASQUERADE
    protocol: all
    source: '0.0.0.0/0'
    destination: '0.0.0.0/0'
    comment: Ansible NAT Masquerade

- name: OpenVPN | Add iptables MASQUERADE rule for VPN subnet
  ansible.builtin.iptables:
    table: nat
    chain: POSTROUTING
    out_interface: "{{ openvpn_external_interface }}"
    source: "{{ item }}"
    jump: MASQUERADE
    state: present
  loop: 
    - "{{ openvpn_subnet }}/24"
    - "{{ openvpn_subnet_for_reserved }}/24"

- name: OpenVPN | Save iptables-rules
  command: netfilter-persistent save

